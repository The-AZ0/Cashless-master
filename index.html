<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashless Validator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --red-light: #fdf2f1;
  --green: #1a9e5f;
  --green-light: #e8f7ef;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --bg: #f2ede7;
  --card: #ffffff;
  --text: #1c1a18;
  --muted: #7a6a58;
  --border: #e0d6ca;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
 
body {
  background: var(--bg);
  min-height: 100vh;
  font-family: var(--sans);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  color: var(--text);
}
 
.page-header {
  width: 100%;
  max-width: 420px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
}
 
.brand-mark {
  width: 50px; height: 50px;
  background: var(--red);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
 
.brand-text h1 {
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}
 
.brand-text p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
 
.card {
  background: var(--card);
  border-radius: 20px;
  width: 100%; max-width: 420px;
  border: 1px solid var(--border);
  padding: 28px 24px 22px;
}
 
.field-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.1px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: block;
}
 
.input-wrap { position: relative; margin-bottom: 14px; }
 
.input-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  display: flex;
}
 
input[type="text"] {
  width: 100%;
  padding: 16px 16px 16px 50px;
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 4px;
  border: 2px solid var(--border);
  border-radius: 14px;
  outline: none;
  color: var(--text);
  background: #fdfcfb;
  transition: border-color 0.18s, box-shadow 0.18s;
  -webkit-appearance: none;
}
 
input[type="text"]:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 4px rgba(192,57,43,0.09);
}
 
input[type="text"]::placeholder {
  color: #ccc0b4;
  letter-spacing: 3px;
  font-weight: 400;
}
 
.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.17s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--red);
  color: #fff;
}
 
.btn:hover { background: var(--red-dark); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
 
#resultado {
  margin-top: 18px;
  border-radius: 14px;
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.25s ease;
}
 
#resultado.show {
  padding: 16px 18px;
  max-height: 200px;
}
 
.res-valido   { background: var(--green-light); border: 2px solid #1a9e5f; }
.res-invalido { background: var(--red-light);   border: 2px solid #e05c52; }
.res-warn     { background: var(--amber-light);  border: 2px solid #f59e0b; }
 
.res-header {
  display: flex;
  align-items: center;
  gap: 9px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
 
.res-code {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 600;
  letter-spacing: 4px;
  margin-bottom: 4px;
}
 
.res-sub { font-size: 13px; color: var(--muted); }
 
.footer {
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}
 
.total-pill {
  background: #f2ede7;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-weight: 600;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
 
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}
</style>
</head>
<body>
 
<div class="page-header">
  <div class="brand-mark">🦁</div>
  <div class="brand-text">
    <h1>Cashless Validator</h1>
    <p>Consulta si un cliente tiene cashless activo</p>
  </div>
</div>
 
<div class="card">
  <label class="field-label" for="codigo">Código del cliente (8 dígitos)</label>
 
  <div class="input-wrap">
    <span class="input-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </span>
    <input
      type="text"
      id="codigo"
      maxlength="8"
      placeholder="00000000"
      autocomplete="off"
      inputmode="numeric"
      aria-label="Código cashless de 8 dígitos"
    >
  </div>
 
  <button class="btn" id="btnValidar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Consultar
  </button>
 
  <div id="resultado" role="alert" aria-live="polite"></div>
 
  <div class="footer">
    <span>Sistema interno autorizado</span>
    <span class="total-pill">
      <span class="dot"></span>
      <span id="totalClientes">0</span> clientes activos
    </span>
  </div>
</div>
 
<script>
// ============================================================
//  BASE DE CÓDIGOS CASHLESS — EDITAR AQUÍ
//  Agregar o quitar números de 8 dígitos en este arreglo.
// ============================================================
const CODIGOS_CASHLESS = new Set([
  10419071,
  10419073,
  10419115,
  10419171,
]);
// ============================================================
 
const elInput = document.getElementById('codigo');
const elRes   = document.getElementById('resultado');
 
document.getElementById('totalClientes').textContent = CODIGOS_CASHLESS.size;
 
function esFormato(codigo) { return /^\d{8}$/.test(codigo); }
 
const ICONOS = {
  ok:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a9e5f" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>`,
  no:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  warn: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};
 
function mostrar(tipo, codigo, sub) {
  const clases = { ok: 'res-valido', no: 'res-invalido', warn: 'res-warn' };
  const titulos = { ok: 'Cliente cashless', no: 'No cashless', warn: 'Atención' };
 
  elRes.className = clases[tipo] + ' show';
  elRes.innerHTML = `
    <div class="res-header">${ICONOS[tipo]} ${titulos[tipo]}</div>
    ${codigo ? `<div class="res-code">${String(codigo).padStart(8,'0')}</div>` : ''}
    <div class="res-sub">${sub}</div>
  `;
}
 
function validar() {
  const raw = elInput.value.trim();
 
  if (!raw) {
    mostrar('warn', '', 'Ingresa un código para consultar.');
    return;
  }
  if (!esFormato(raw)) {
    mostrar('warn', raw, 'El código debe tener exactamente 8 dígitos numéricos.');
    return;
  }
 
  const esCashless = CODIGOS_CASHLESS.has(Number(raw));
  mostrar(
    esCashless ? 'ok' : 'no',
    raw,
    esCashless
      ? 'Registrado y habilitado para pagos cashless.'
      : 'Este código no está en la base cashless.'
  );
 
  setTimeout(() => { elInput.value = ''; elInput.focus(); }, 1500);
}
 
document.getElementById('btnValidar').addEventListener('click', validar);
 
elInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); validar(); } });
 
elInput.addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '');
  if (this.value.length === 8) validar();
});
 
window.addEventListener('DOMContentLoaded', () => elInput.focus());
</script>
</body>
</html>
